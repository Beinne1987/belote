name: Belote macOS Release

# يُشغَّل يدوياً أو عند الدفع إلى main — يبني Belote.app ويحزّمه DMG كـ artifact
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'packages/**'
      - '.github/workflows/belote-macos.yml'

concurrency:
  group: belote-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Belote.app + DMG
    # ⚠️ **مشغّلٌ Intel عمدًا** (`macos-15-intel`): `macos-latest` صار Apple
    # Silicon، وحزمةُ arm64 وحدَها تكراش فورَ الإقلاع على ماك Intel. البناءُ
    # هنا شاملٌ (`ARCHS = arm64 x86_64`)، لكنّ مشغّلَ Intel يجعل **اختبارَ
    # الإقلاع أدناه حقيقيًّا** على المعماريّة التي انكسرت. (`macos-13` سُحب
    # نهائيًّا في ديسمبر 2025.)
    runs-on: macos-15-intel
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.44.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      # **Xcode 26 إلزاميّ** على مشغّل Intel: افتراضُه 16.4 بحزمةِ تطويرِ 15.5،
      # و`connectivity_plus` يستدعي `NWPath.isUltraConstrained` (واجهةُ macOS 26)
      # خلف `#available` — والفحصُ زمنَ تشغيلٍ لا يُغني عن وجودها في الـSDK
      # زمنَ الترجمة ⇒ `BUILD FAILED`. نختار الأحدثَ من عائلة 26 لا رقمًا مثبَّتًا
      # كي لا ينكسر البناءُ مع كلّ تحديثِ صورةٍ للمشغّل.
      - name: Select newest Xcode 26 (macOS 26 SDK)
        run: |
          set -e
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "::error::No Xcode 26 on this runner — connectivity_plus needs the macOS 26 SDK"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install native build deps
        run: brew install automake libtool create-dmg

      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      - name: Get dependencies
        run: flutter pub get

      # ⚠️ --dart-define ليس اختياريّاً (نفسُ درس الويندوز والأندرويد)
      - name: Build macOS release
        run: >
          flutter build macos --release --no-pub
          --dart-define=BELOTE_SERVER=https://hisabipro.com/belote
          --build-number=${{ github.run_number }}

      # **حارسُ المعماريّة**: الحزمةُ يجب أن تكون شاملةً (arm64 + x86_64).
      # كراشُ 2026-07-22 على ماك Intel كان حزمةَ arm64 وحدَها، ولا شيءَ في
      # البناء يشتكي — يفشل عند المستخدم صامتًا. هنا يفشل البناءُ بدلَه.
      - name: Verify universal binary (must include x86_64)
        run: |
          set -e
          BIN=build/macos/Build/Products/Release/Belote.app/Contents/MacOS/Belote
          if [ ! -f "$BIN" ]; then echo "::error::Executable missing at $BIN"; exit 1; fi
          echo "runner arch: $(uname -m)"
          lipo -archs "$BIN"
          lipo -archs "$BIN" | grep -q x86_64 || {
            echo "::error::Belote binary has no x86_64 slice — Intel Macs will crash on launch"
            exit 1
          }
          lipo -archs "$BIN" | grep -q arm64 || {
            echo "::error::Belote binary has no arm64 slice — Apple Silicon Macs will run under Rosetta"
            exit 1
          }

      # التحقّق + إعادةُ توقيعٍ ad-hoc تحفظ الـ entitlements (وإلّا فقدت النسخةُ
      # المنشورة صلاحيةَ الشبكة داخل الصندوق الرمليّ = بلا إنترنت بصمت).
      - name: Verify bundle & re-sign (keep entitlements)
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Belote.app"
          EXEC="$APP/Contents/MacOS/Belote"
          if [ ! -f "$EXEC" ]; then echo "::error::Executable missing at $EXEC"; exit 1; fi
          file "$EXEC"
          xattr -cr "$APP" || true
          # 1) توقيعٌ عميقٌ صالحٌ لكلّ ما بالداخل (يمنع kLSNoExecutableErr)
          codesign --force --deep --sign - --timestamp=none "$APP"
          # 2) إعادةُ توقيع القشرة العليا مع الـ entitlements كي تبقى صلاحيةُ الشبكة
          codesign --force --sign - --timestamp=none \
            --entitlements macos/Runner/Release.entitlements "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -d --entitlements :- "$APP" | grep -q network.client \
            && echo "✅ network.client entitlement present" \
            || { echo "::error::network entitlement missing after re-sign"; exit 1; }

      # **اختبارُ إقلاعٍ حقيقيّ** — بعد إعادة التوقيع عمدًا: يُشغَّل ما يُشحَن
      # بالضبط (توقيعٌ مكسورٌ يكراش أيضًا). عشرُ ثوانٍ تكفي: كراشُ المعماريّة
      # وكراشُ اللقطة (snapshot) كلاهما يقع في أوّل ثانية. عند الموت يُطبَع أحدثُ
      # تقريرِ تعطّلٍ كاملًا — بلا ذلك يبقى «التطبيقُ أُغلق فجأة» بلا سبب.
      - name: Smoke test (launch and survive 10s)
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Belote.app"
          open "$APP" || { echo "::error::open failed for $APP"; exit 1; }
          sleep 10
          if pgrep -x Belote >/dev/null; then
            echo "✅ Belote is still running after 10s"
            pkill -x Belote || true
            exit 0
          fi
          echo "::error::Belote died within 10s of launch"
          for DIR in "$HOME/Library/Logs/DiagnosticReports" /Library/Logs/DiagnosticReports; do
            [ -d "$DIR" ] || continue
            LATEST=$(ls -t "$DIR" 2>/dev/null | head -1)
            [ -n "$LATEST" ] || continue
            echo "── $DIR/$LATEST ──"
            cat "$DIR/$LATEST"
          done
          exit 1

      - name: Build installer (.dmg)
        id: dmg
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Belote.app"
          DMG="belote-macos.dmg"
          create-dmg \
            --volname "Belote" \
            --window-size 600 360 \
            --icon-size 110 \
            --icon "Belote.app" 150 185 \
            --app-drop-link 450 185 \
            "$DMG" "$APP" || true
          if [ ! -f "$DMG" ]; then
            echo "create-dmg لم يُنتج ملفاً — احتياط hdiutil"
            hdiutil create -volname "Belote" -srcfolder "$APP" -ov -format UDZO "$DMG"
          fi
          ls -lh "$DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: belote-macos
          path: app/belote-macos.dmg
          retention-days: 7
          if-no-files-found: error
