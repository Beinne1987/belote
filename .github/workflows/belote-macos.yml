name: Belote macOS Release

# يُشغَّل يدوياً أو عند الدفع إلى main — يبني Belote.app ويحزّمه DMG كـ artifact
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'packages/**'
      - '.github/workflows/belote-macos.yml'

concurrency:
  group: belote-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Belote.app + DMG
    # ⚠️ **مشغّلٌ Intel عمدًا** (`macos-15-intel`): `macos-latest` صار Apple
    # Silicon، وحزمةُ arm64 وحدَها تكراش فورَ الإقلاع على ماك Intel. البناءُ
    # هنا شاملٌ (`ARCHS = arm64 x86_64`)، لكنّ مشغّلَ Intel يجعل **اختبارَ
    # الإقلاع أدناه حقيقيًّا** على المعماريّة التي انكسرت. (`macos-13` سُحب
    # نهائيًّا في ديسمبر 2025.)
    runs-on: macos-15-intel
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ⛔ **بلا كاشِ محرّك** (`cache: false`): الكاشُ هنا يخزّن شجرةَ Flutter
      # كاملةً بما فيها `bin/cache/artifacts/engine` — ومنها يُنسَخ
      # `FlutterMacOS.framework` إلى الحزمة. كاشٌ بائتٌ (أو محرّكُ debug) يعطي
      # حزمةً رموزُها في `App.framework` سليمةٌ و`FlutterMacOS` لا يطابقها.
      # يُنزَّل المحرّكُ نظيفًا بـ`flutter precache --macos` أدناه.
      - name: Setup Flutter 3.44.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: false

      # الكاشُ الوحيدُ المسموح: حزمُ pub (دارتٌ خالصٌ، لا علاقةَ له بالمحرّك).
      - name: Cache pub packages only
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # **Xcode 26 إلزاميّ** على مشغّل Intel: افتراضُه 16.4 بحزمةِ تطويرِ 15.5،
      # و`connectivity_plus` يستدعي `NWPath.isUltraConstrained` (واجهةُ macOS 26)
      # خلف `#available` — والفحصُ زمنَ تشغيلٍ لا يُغني عن وجودها في الـSDK
      # زمنَ الترجمة ⇒ `BUILD FAILED`. نختار الأحدثَ من عائلة 26 لا رقمًا مثبَّتًا
      # كي لا ينكسر البناءُ مع كلّ تحديثِ صورةٍ للمشغّل.
      - name: Select newest Xcode 26 (macOS 26 SDK)
        run: |
          set -e
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "::error::No Xcode 26 on this runner — connectivity_plus needs the macOS 26 SDK"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install native build deps
        run: brew install automake libtool create-dmg

      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      # **أرضٌ نظيفةٌ قبل البناء**: كلُّ ما قد يحمل محرّكًا قديمًا أو أثرَ بناءٍ
      # سابقٍ يُمحى، ثمّ يُنزَّل محرّكُ ماك من جديدٍ للنسخة المثبَّتة (3.44.6).
      # هذا علاجُ «App.framework سليمٌ وFlutterMacOS لا يطابقه».
      - name: Clean slate (no stale engine or build residue)
        run: |
          set -e
          flutter clean
          rm -rf macos/Flutter/ephemeral macos/Pods macos/Podfile.lock build
          flutter precache --macos
          flutter pub get

      # ⚠️ --dart-define ليس اختياريّاً (نفسُ درس الويندوز والأندرويد)
      - name: Build macOS release
        run: >
          flutter build macos --release --no-pub
          --dart-define=BELOTE_SERVER=https://hisabipro.com/belote
          --build-number=${{ github.run_number }}

      # **حارسُ المعماريّة**: الحزمةُ يجب أن تكون شاملةً (arm64 + x86_64).
      # كراشُ 2026-07-22 على ماك Intel كان حزمةَ arm64 وحدَها، ولا شيءَ في
      # البناء يشتكي — يفشل عند المستخدم صامتًا. هنا يفشل البناءُ بدلَه.
      - name: Verify universal binary (must include x86_64)
        run: |
          set -e
          BIN=build/macos/Build/Products/Release/Belote.app/Contents/MacOS/Belote
          if [ ! -f "$BIN" ]; then echo "::error::Executable missing at $BIN"; exit 1; fi
          echo "runner arch: $(uname -m)"
          lipo -archs "$BIN"
          lipo -archs "$BIN" | grep -q x86_64 || {
            echo "::error::Belote binary has no x86_64 slice — Intel Macs will crash on launch"
            exit 1
          }
          lipo -archs "$BIN" | grep -q arm64 || {
            echo "::error::Belote binary has no arm64 slice — Apple Silicon Macs will run under Rosetta"
            exit 1
          }

      # **حارسُ المحرّك**: `FlutterMacOS` موجودٌ فعلًا في الحزمة، و**لا
      # `kernel_blob.bin`** — وجودُه يعني حزمةً بمحرّك debug/JIT (تفسيرُ دارت من
      # الـkernel) لا AOT، وهي بالضبط الحالةُ التي تُرى فيها رموزُ AOT في
      # `App.framework` بينما لا يطابقها المحرّكُ المنسوخ.
      - name: Verify embedded Flutter engine (AOT, not debug)
        run: |
          set -e
          APP=build/macos/Build/Products/Release/Belote.app
          ls -l "$APP/Contents/Frameworks/FlutterMacOS.framework/Versions/A/FlutterMacOS"
          lipo -archs "$APP/Contents/Frameworks/FlutterMacOS.framework/Versions/A/FlutterMacOS"
          lipo -archs "$APP/Contents/Frameworks/App.framework/Versions/A/App"
          if [ -e "$APP/Contents/Frameworks/App.framework/Versions/A/Resources/flutter_assets/kernel_blob.bin" ]; then
            echo "::error::kernel_blob.bin present — this is a debug/JIT bundle, not an AOT release"
            exit 1
          fi
          echo "✅ AOT bundle: FlutterMacOS present, no kernel_blob.bin"

      # **حارسُ أدنى نسخةِ نظام** — الدرسُ الأغلى (2026-07-22): مكتبةٌ واحدةٌ
      # تشترط نسخةً أحدثَ من جهاز اللاعب تُميت التطبيقَ قبل أن يُرسَم إطار،
      # و`dyld` وحدَه يعرف ذلك. المشغّلُ يعمل macOS 15 فلا يظهر عليه شيء مهما
      # طال اختبارُ الإقلاع ⇒ لا بدّ من فحصٍ صريحٍ لكلّ ثنائيّةٍ في الحزمة.
      # (الجاني كان `objective_c.framework` بـmin 13.0: يبنيه Flutter برقمٍ
      # ثابتٍ في أداته متجاهلًا `MACOSX_DEPLOYMENT_TARGET`.)
      - name: Verify minimum macOS of every binary (11.0)
        run: python3 tool/verify_min_macos.py build/macos/Build/Products/Release/Belote.app 11.0

      # التحقّق + إعادةُ توقيعٍ ad-hoc تحفظ الـ entitlements (وإلّا فقدت النسخةُ
      # المنشورة صلاحيةَ الشبكة داخل الصندوق الرمليّ = بلا إنترنت بصمت).
      - name: Verify bundle & re-sign (keep entitlements)
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Belote.app"
          EXEC="$APP/Contents/MacOS/Belote"
          if [ ! -f "$EXEC" ]; then echo "::error::Executable missing at $EXEC"; exit 1; fi
          file "$EXEC"
          xattr -cr "$APP" || true
          # 1) توقيعٌ عميقٌ صالحٌ لكلّ ما بالداخل (يمنع kLSNoExecutableErr)
          codesign --force --deep --sign - --timestamp=none "$APP"
          # 2) إعادةُ توقيع القشرة العليا مع الـ entitlements كي تبقى صلاحيةُ الشبكة
          codesign --force --sign - --timestamp=none \
            --entitlements macos/Runner/Release.entitlements "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -d --entitlements :- "$APP" | grep -q network.client \
            && echo "✅ network.client entitlement present" \
            || { echo "::error::network entitlement missing after re-sign"; exit 1; }

      # **اختبارُ إقلاعٍ حقيقيّ** — بعد إعادة التوقيع عمدًا: يُشغَّل ما يُشحَن
      # بالضبط (توقيعٌ مكسورٌ يكراش أيضًا). عشرُ ثوانٍ تكفي: كراشُ المعماريّة
      # وكراشُ اللقطة (snapshot) كلاهما يقع في أوّل ثانية. عند الموت يُطبَع أحدثُ
      # تقريرِ تعطّلٍ كاملًا — بلا ذلك يبقى «التطبيقُ أُغلق فجأة» بلا سبب.
      - name: Smoke test (launch and survive 10s)
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Belote.app"
          open "$APP" || { echo "::error::open failed for $APP"; exit 1; }
          sleep 10
          if pgrep -x Belote >/dev/null; then
            echo "✅ Belote is still running after 10s"
            pkill -x Belote || true
            exit 0
          fi
          echo "::error::Belote died within 10s of launch"
          for DIR in "$HOME/Library/Logs/DiagnosticReports" /Library/Logs/DiagnosticReports; do
            [ -d "$DIR" ] || continue
            LATEST=$(ls -t "$DIR" 2>/dev/null | head -1)
            [ -n "$LATEST" ] || continue
            echo "── $DIR/$LATEST ──"
            cat "$DIR/$LATEST"
          done
          exit 1

      # **مصدرٌ واحدٌ لا لبس**: نُرحّل `$APP` — الحزمةَ التي فُحصت وأُقلعت —
      # إلى مجلّدِ تجهيزٍ فارغٍ بـ`ditto` (تحفظ الروابطَ الرمزيّةَ للأطر
      # والبياناتِ الوصفيّة؛ `cp -R` تفسدها) ونبني الـDMG من ذلك المجلّد وحدَه،
      # فلا يلتقط `create-dmg` أيَّ حزمةٍ أخرى من الشجرة.
      - name: Build installer (.dmg)
        id: dmg
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Belote.app"
          DMG="belote-macos.dmg"
          STAGE="dmg-stage"
          rm -rf "$STAGE" "$DMG"
          mkdir -p "$STAGE"
          ditto "$APP" "$STAGE/Belote.app"
          [ -d "$STAGE/Belote.app" ] || { echo "::error::staging failed"; exit 1; }
          create-dmg \
            --volname "Belote" \
            --window-size 600 360 \
            --icon-size 110 \
            --icon "Belote.app" 150 185 \
            --app-drop-link 450 185 \
            "$DMG" "$STAGE" || true
          if [ ! -f "$DMG" ]; then
            echo "create-dmg لم يُنتج ملفاً — احتياط hdiutil"
            hdiutil create -volname "Belote" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          fi
          ls -lh "$DMG"

      # **ما في الـDMG هو ما فُحص**: نركّبه ونعيد الفحوصَ على نسخته — معماريّةً
      # ومحرّكًا وتوقيعًا. الفحصُ على `build/` وحدَه لا يُثبت شيئًا عمّا يُشحَن.
      - name: Verify the DMG contents (not just the build dir)
        run: |
          set -e
          DMG="belote-macos.dmg"
          MNT=$(mktemp -d)
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MNT"
          A="$MNT/Belote.app"
          trap 'hdiutil detach "$MNT" -quiet || true' EXIT
          [ -d "$A" ] || { echo "::error::Belote.app not found inside the DMG"; exit 1; }
          lipo -archs "$A/Contents/MacOS/Belote"
          lipo -archs "$A/Contents/MacOS/Belote" | grep -q x86_64 || {
            echo "::error::DMG copy has no x86_64 slice"; exit 1; }
          [ -f "$A/Contents/Frameworks/FlutterMacOS.framework/Versions/A/FlutterMacOS" ] || {
            echo "::error::FlutterMacOS missing inside the DMG"; exit 1; }
          # `[ -e … ] && { … }` تحت `set -e` **تُفشل الخطوةَ في الحالة السليمة**
          # (القائمةُ كلُّها تردّ 1 حين لا يوجد الملفّ) ⇒ `if` لا `&&`.
          if [ -e "$A/Contents/Frameworks/App.framework/Versions/A/Resources/flutter_assets/kernel_blob.bin" ]; then
            echo "::error::kernel_blob.bin inside the DMG — debug bundle shipped"
            exit 1
          fi
          codesign --verify --deep --strict "$A"
          codesign -d --entitlements :- "$A" | grep -q network.client || {
            echo "::error::network.client entitlement lost inside the DMG"; exit 1; }
          python3 tool/verify_min_macos.py "$A" 11.0
          echo "✅ DMG contents match what was tested"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: belote-macos
          path: app/belote-macos.dmg
          retention-days: 7
          if-no-files-found: error
